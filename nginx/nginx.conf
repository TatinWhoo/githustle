# nginx.conf — reverse proxy for GitHustle API
# Handles SSL termination, keeps API container on plain HTTP

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Upstream: the Node API container
    upstream api {
        server api:4000;
        keepalive 64;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name api.githustle.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name api.githustle.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;

            # Required for Socket.io WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Pass real client IP (needed for rate limiting + audit logs)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE: disable buffering so tokens stream immediately
            proxy_buffering off;
            proxy_cache off;

            # SSE + WebSocket need longer timeouts
            proxy_read_timeout 300s;
            proxy_connect_timeout 10s;
        }

        # ── Health check (no auth) ─────────────────────────────────────────────
        location /health {
            proxy_pass http://api;
        }

        # ── Socket.io ─────────────────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

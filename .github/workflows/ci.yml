name: CI — Build & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: githustle_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Check app loads
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/githustle_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-secret-at-least-32-characters-long
          CLIENT_URL: http://localhost:3000
        run: node -e "require('./src/app'); console.log('App loaded OK');"
        working-directory: server

  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    # Only push on main branch (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/githustle-api:latest
            ghcr.io/${{ github.repository_owner }}/githustle-api:${{ github.sha }}
          # Use BuildKit layer cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
